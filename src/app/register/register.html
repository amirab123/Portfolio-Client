<div class="auth-container">
  <h2> créez un compte</h2>

  <form [formGroup]="form" (ngSubmit)="register()">
    <div class="form-group">
      <label>Nom d'utilisateur</label>
      <input type="text" formControlName="username" placeholder="Entrez votre nom d'utilisateur" />
      <span *ngIf="form.get('username')?.invalid && form.get('username')?.touched">Nom requis</span>
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" formControlName="password" placeholder="Entrez votre mot de passe" />
      <span *ngIf="form.get('password')?.invalid && form.get('password')?.touched">Mot de passe requis  
          <span *ngIf="form.get('password')?.errors?.['minlength']">
      (minimum 6 caractères)
    </span>
      </span>
    </div>
<div class="form-group">
  <label>Confirmer le mot de passe</label>
  <input type="password" formControlName="confirmPassword" placeholder="Confirmez votre mot de passe" />

  <span *ngIf="form.errors?.['passwordMismatch'] && form.get('confirmPassword')?.touched">
    Les mots de passe ne correspondent pas
  </span>
</div>


    <div class="form-group" style="display:none;">
      <label>Rôle</label>
      <input type="text" formControlName="role" />
    </div>

    <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>
<br>
    <button type="submit" [disabled]="form.invalid">S'inscrire</button>
  </form>

  <p>Déjà inscrit ? <a routerLink="/login">Se connecter</a></p>
</div>
